<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatMaster Academy SPA</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f4f6fb; color: #23283a; }
    .container { max-width: 1080px; margin: 0 auto; padding: 16px; }
    .topbar { background: #fff; border-bottom: 1px solid #e5e8f0; position: sticky; top: 0; z-index: 10; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .nav a { text-decoration: none; color: #2a6af8; padding: 6px 8px; border-radius: 6px; }
    .nav a.active { background: #e9f0ff; font-weight: 700; color: #0a47bb; }
    .spacer { flex: 1; }
    .user-state { font-size: 14px; color: #4f5670; }
    .btn { border: 1px solid #cfd6ea; background: #fff; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
    .btn.primary { background: #2a6af8; border-color: #2a6af8; color: #fff; }
    .btn.danger { color: #c53030; border-color: #f2c6c6; }
    #app { background: #fff; border: 1px solid #e5e8f0; border-radius: 12px; padding: 16px; min-height: 300px; margin-top: 14px; }
    .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .card { border: 1px solid #e5e8f0; border-radius: 10px; padding: 12px; background: #fff; }
    .muted { color: #67708c; }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .form-row > * { flex: 1; }
    input, select { width: 100%; border: 1px solid #d6dced; border-radius: 8px; padding: 8px; }
    .error { background: #fff2f2; color: #b42318; border: 1px solid #f0b9b9; border-radius: 8px; padding: 8px; margin-bottom: 10px; }
    .success { background: #edfdf1; color: #067647; border: 1px solid #b7e7c9; border-radius: 8px; padding: 8px; margin-bottom: 10px; }
    .spinner { padding: 16px; text-align: center; color: #4f5670; }
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 375px) {
      .container { padding: 10px; }
      .grid { grid-template-columns: 1fr; }
      .form-row { flex-direction: column; }
      .nav { gap: 6px; }
      .btn { width: 100%; }
      .spacer { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a data-link href="/">Главная</a>
      <a data-link href="/courses">Каталог</a>
      <a data-link href="/mentors">Наставники</a>
      <a data-link href="/dashboard">Мое обучение</a>
      <a data-link href="/checkout">Оплата</a>
      <a data-link href="/profile">Профиль</a>
      <span class="spacer"></span>
      <span id="userState" class="user-state">Гость</span>
      <a id="navLogin" data-link href="/auth/login">Войти</a>
      <a id="navRegister" data-link href="/auth/register">Регистрация</a>
      <button id="navLogoutBtn" class="btn danger" type="button" style="display:none;">Выйти</button>
    </div>
  </header>
  <main class="container">
    <div id="app"></div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
