<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BeatMaster Academy - Вход</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 50px; }
        .auth-form { background: #2d2d2d; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 90%; margin: 10px 0; padding: 10px; border-radius: 4px; border: none; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-form">
        <h2>Вход в BeatMaster</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <p id="status"></p>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('status');

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Сохраняем токен в памяти браузера
                localStorage.setItem('token', data.token);
                window.location.href = '/profile.html';
                status.innerText = "Успешный вход!";
                status.style.color = "lightgreen";
            } else {
                status.innerText = data.message;
                status.style.color = "red";
            }
        }
    </script>
</body>
</html>
